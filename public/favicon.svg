<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="sat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Orbit ring -->
  <ellipse cx="256" cy="256" rx="180" ry="70" transform="rotate(-25 256 256)" fill="none" stroke="#ffffff" stroke-width="12" stroke-opacity="0.35" stroke-dasharray="20 12"/>
  <!-- Planet -->
  <circle cx="256" cy="270" r="85" fill="#1e3a5f" stroke="#60a5fa" stroke-width="6" stroke-opacity="0.5"/>
  <ellipse cx="256" cy="270" rx="85" ry="20" fill="none" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.3"/>
  <ellipse cx="256" cy="270" rx="60" ry="85" fill="none" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.2"/>
  <!-- Continent-like shapes -->
  <ellipse cx="240" cy="245" rx="28" ry="22" fill="#34d399" fill-opacity="0.6"/>
  <ellipse cx="280" cy="280" rx="20" ry="16" fill="#34d399" fill-opacity="0.5"/>
  <!-- Satellite body -->
  <g transform="translate(340, 160) rotate(45)">
    <!-- Main body -->
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="url(#sat)"/>
    <!-- Solar panel left -->
    <rect x="-52" y="-8" width="36" height="16" rx="2" fill="#818cf8" stroke="#ffffff" stroke-width="2"/>
    <line x1="-46" y1="-8" x2="-46" y2="8" stroke="#6366f1" stroke-width="1"/>
    <line x1="-36" y1="-8" x2="-36" y2="8" stroke="#6366f1" stroke-width="1"/>
    <line x1="-26" y1="-8" x2="-26" y2="8" stroke="#6366f1" stroke-width="1"/>
    <!-- Solar panel right -->
    <rect x="16" y="-8" width="36" height="16" rx="2" fill="#818cf8" stroke="#ffffff" stroke-width="2"/>
    <line x1="22" y1="-8" x2="22" y2="8" stroke="#6366f1" stroke-width="1"/>
    <line x1="32" y1="-8" x2="32" y2="8" stroke="#6366f1" stroke-width="1"/>
    <line x1="42" y1="-8" x2="42" y2="8" stroke="#6366f1" stroke-width="1"/>
    <!-- Antenna -->
    <line x1="0" y1="-12" x2="0" y2="-24" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="0" cy="-26" r="3" fill="#ffffff"/>
  </g>
  <!-- Signal waves from satellite -->
  <path d="M 310 185 Q 290 205 285 230" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M 320 195 Q 300 215 295 240" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.2" stroke-linecap="round"/>
</svg>
